<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小兔头节拍器 🐰</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;background:linear-gradient(180deg,#ffecd2 0%,#fcb69f 100%);display:flex;align-items:center;justify-content:center;padding:15px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
        .container{background:#fff;border-radius:40px;box-shadow:0 20px 60px rgba(252,147,127,0.25);width:100%;max-width:420px;overflow:hidden}
        .header{padding:25px 20px 15px;text-align:center;background:linear-gradient(180deg,#fff8f5 0%,#fff 100%)}
        .bunny{font-size:64px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.1))}
        h1{font-size:24px;font-weight:800;color:#ff9a9e;margin-top:5px}
        .beats-section{padding:15px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;min-height:90px;align-items:center;background:#fff}
        .beat{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;transition:transform .1s}
        .beat.uniform{background:#a8edea;box-shadow:0 4px 12px rgba(168,237,234,0.5)}
        .beat.strong{background:#ff6b6b;width:64px;height:64px;font-size:24px;box-shadow:0 5px 18px rgba(255,107,107,0.5)}
        .beat.traditional{background:#a8edea;box-shadow:0 4px 12px rgba(168,237,234,0.5)}
        .beat.voice{background:#ffd93d;box-shadow:0 4px 12px rgba(255,217,61,0.5)}
        .beat.pop{transform:scale(1.3)}
        .bpm-btn{width:44px;height:44px;border-radius:50%;border:none;font-size:26px;font-weight:700;cursor:pointer;background:#ffeaa7;color:#e17055;box-shadow:0 4px 12px rgba(255,217,61,0.4)}
        .bpm-display{text-align:center}
        .bpm-val{font-size:58px;font-weight:900;color:#74b9ff}
        .bpm-unit{font-size:13px;color:#a29bfe;font-weight:700}
                .slider-wrap{padding:0 20px 15px;background:#fff}
        .slider-row{display:flex;align-items:center;gap:12px}
        .bpm-btn.sm{width:32px;height:32px;border-radius:50%;border:none;font-size:18px;font-weight:700;cursor:pointer;background:#ffeaa7;color:#e17055;padding:0;line-height:1;flex-shrink:0}
        .bpm-section{display:flex;justify-content:center;align-items:center;padding:10px 25px 5px;background:#fff}
        input[type=range]{-webkit-appearance:none;width:100%;height:10px;border-radius:5px;background:linear-gradient(90deg,#a8edea,#ffeaa7,#ff9a9e)}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:#fff;border:3px solid #ff9a9e;cursor:pointer}
        .control{padding:10px 25px 25px;display:flex;justify-content:center;background:#fff}
        .play-btn{width:80px;height:80px;border-radius:50%;border:none;font-size:36px;cursor:pointer;background:#55efc4;color:#fff;box-shadow:0 8px 25px rgba(0,184,148,0.4)}
        .play-btn.running{background:#ff6b6b;box-shadow:0 8px 25px rgba(255,107,107,0.4)}
        .settings{background:linear-gradient(135deg,#fff8f5,#fffaf8);border-radius:24px;margin:8px 0 0;overflow:hidden;box-shadow:0 2px 12px rgba(252,147,127,0.08)}
        .toggle{width:100%;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;border:none;cursor:pointer;font-size:14px;font-weight:700;color:#ff9a9e;background:transparent;transition:background .2s}
        .toggle:hover{background:rgba(255,154,158,0.08)}
        .toggle-arrow{font-size:11px;background:rgba(255,154,158,0.12);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;transition:transform .3s}
        .toggle.open .toggle-arrow{transform:rotate(180deg)}
        .panel{max-height:0;overflow:hidden;transition:max-height .35s ease}
        .panel.open{max-height:450px}
        .panel-inner{padding:15px 20px 20px;border-top:1px solid rgba(252,147,127,0.1)}
        .section-title{font-size:11px;font-weight:700;color:#b2bec3;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
        .mode-row{display:flex;gap:8px;margin-bottom:15px}
        .mode-btn{flex:1;padding:10px 6px;border-radius:12px;background:#f8f9fa;border:2px solid transparent;cursor:pointer;text-align:center;font-size:12px;font-weight:700;color:#666}
        .mode-btn.active{background:linear-gradient(135deg,#a8edea,#7dd3d0);color:#fff}
        .mode-icon{font-size:24px;margin-bottom:4px}
        .time-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px}
        .time-btn{padding:10px 6px;border-radius:12px;background:#f8f9fa;border:2px solid transparent;cursor:pointer;text-align:center;font-weight:800;font-size:15px;color:#333}
        .time-btn.active{background:linear-gradient(135deg,#ffeaa7,#ffd93d);border-color:transparent;color:#e17055}
        .time-btn small{display:block;font-size:11px;font-weight:500;opacity:.7;margin-top:3px}
        .custom-row{display:flex;align-items:center;gap:8px;margin-top:12px}
        .custom-input{width:55px;height:42px;border:2px solid #eee;border-radius:10px;text-align:center;font-size:18px;font-weight:700;color:#333}
        .custom-sep{font-size:22px;font-weight:700;color:#ccc}
        .apply-btn{padding:10px 18px;background:linear-gradient(135deg,#ff9a9e,#ff6b6b);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer}
                .debug{margin:0;padding:8px 12px;background:#111;color:#0f0;font-size:10px;font-family:monospace;max-height:60px;overflow-y:auto;white-space:pre-wrap;display:none}
        .debug.show{display:block}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="bunny">🐰</div>
            <h1>小兔头节拍器</h1>
        </div>
        <div class="beats-section" id="beats-container"></div>

        <div class="bpm-section">
            <div class="bpm-display">
                <div class="bpm-val" id="bpm-display">120</div>
                <div class="bpm-unit">BPM</div>
            </div>
        </div>
        <div class="slider-wrap">
            <div class="slider-row">
                <button class="bpm-btn sm" id="bpm-minus">−</button>
                <input type="range" min="40" max="208" value="120" id="bpm-slider">
                <button class="bpm-btn sm" id="bpm-plus">+</button>
            </div>
        </div>
        <div class="control">
            <button class="play-btn" id="play-btn">▶</button>
        </div>
        <div class="settings">
            <button class="toggle" id="settings-toggle">设置 <span class="toggle-arrow">▼</span></button>
            <div class="panel" id="settings-panel">
                <div class="panel-inner">
                    <div class="section-title">音效模式</div>
                    <div class="mode-row">
                        <div class="mode-btn" data-mode="traditional"><div class="mode-icon">🥁</div>传统</div>
                        <div class="mode-btn active" data-mode="uniform"><div class="mode-icon">🎵</div>均匀</div>
                        <div class="mode-btn" data-mode="voice"><div class="mode-icon">🗣️</div>童音</div>
                    </div>
                    <div class="section-title">节拍</div>
                    <div class="time-row">
                        <button class="time-btn active" data-sig="4/4">4/4<small>四拍</small></button>
                        <button class="time-btn" data-sig="3/4">3/4<small>圆舞曲</small></button>
                        <button class="time-btn" data-sig="2/4">2/4<small>进行曲</small></button>
                        <button class="time-btn" data-sig="6/8">6/8<small>八六拍</small></button>
                        <button class="time-btn" data-sig="5/4">5/4<small>复合拍</small></button>
                        <button class="time-btn" data-sig="7/8">7/8<small>现代</small></button>
                    </div>
                    <div class="section-title">自定义</div>
                    <div class="custom-row">
                        <input type="number" id="custom-beats" class="custom-input" min="1" max="16" value="4">
                        <span class="custom-sep">/</span>
                        <input type="number" id="custom-unit" class="custom-input" min="1" max="16" value="4">
                        <button class="apply-btn" id="apply-btn">应用</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="debug" id="debug-log"></div>
        
    </div>
<script>
var log=function(){var m=Array.prototype.join.call(arguments," ");console.log(m);var d=document.getElementById("debug-log");if(d){d.textContent+=m+"\n";d.scrollTop=d.scrollHeight;}};
var s={bpm:120,bc:4,bu:4,r:false,cb:0,sm:"uniform",ac:null,sn:null,ss:window.speechSynthesis};
var cfg=JSON.parse(localStorage.getItem("metronome")||"{}");
if(cfg.bpm)s.bpm=cfg.bpm;
if(cfg.bc)s.bc=cfg.bc;
if(cfg.sm)s.sm=cfg.sm;
document.getElementById("bpm-display").textContent=s.bpm;
document.getElementById("bpm-slider").value=s.bpm;
document.getElementById("custom-beats").value=s.bc;
document.getElementById("custom-unit").value=s.bu;
document.querySelectorAll(".mode-btn").forEach(function(e){e.classList.toggle("active",e.dataset.mode===s.sm);});
document.querySelectorAll(".time-btn").forEach(function(e){e.classList.toggle("active",e.dataset.sig===s.bc+"/"+s.bu);});
log("加载配置 BPM="+s.bpm+" bc="+s.bc+" sm="+s.sm);
document.getElementById("settings-toggle").onclick=function(){this.classList.toggle("open");document.getElementById("settings-panel").classList.toggle("open");};
document.getElementById("play-btn").onclick=function(){s.r?stop():start();};
document.getElementById("bpm-minus").onclick=function(){setBpm(s.bpm-1);};
document.getElementById("bpm-plus").onclick=function(){setBpm(s.bpm+1);};
document.getElementById("bpm-slider").oninput=function(e){setBpm(parseInt(e.target.value));};
document.querySelectorAll(".mode-btn").forEach(function(el){el.onclick=function(){setMode(el.dataset.mode);};});
document.querySelectorAll(".time-btn").forEach(function(el){el.onclick=function(){setTS(el.dataset.sig);};});
var applyBtn=document.getElementById("apply-btn");
applyBtn.addEventListener("contextmenu",function(e){e.preventDefault();document.getElementById("debug-log").classList.toggle("show");});
var applyTimer=null;
applyBtn.addEventListener("touchstart",function(e){applyTimer=setTimeout(function(){document.getElementById("debug-log").classList.add("show");},2000);},{passive:true});
applyBtn.addEventListener("touchend",function(){if(applyTimer){clearTimeout(applyTimer);applyTimer=null;}});
applyBtn.addEventListener("touchmove",function(){if(applyTimer){clearTimeout(applyTimer);applyTimer=null;}});
applyBtn.addEventListener("mousedown",function(e){applyTimer=setTimeout(function(){document.getElementById("debug-log").classList.add("show");},2000);});
applyBtn.addEventListener("mouseup",function(){if(applyTimer){clearTimeout(applyTimer);applyTimer=null;}});
applyBtn.addEventListener("mouseleave",function(){if(applyTimer){clearTimeout(applyTimer);applyTimer=null;}});
document.getElementById("apply-btn").onclick=function(){var b=parseInt(document.getElementById("custom-beats").value)||4;var u=parseInt(document.getElementById("custom-unit").value)||4;setTS(b+"/"+u);};
function save(){localStorage.setItem("metronome",JSON.stringify({bpm:s.bpm,bc:s.bc,bu:s.bu,sm:s.sm}));}
function setBpm(b){s.bpm=Math.max(40,Math.min(208,b));document.getElementById("bpm-display").textContent=s.bpm;document.getElementById("bpm-slider").value=s.bpm;if(s.r){stop();start();}save();}
function initAudio(){if(s.ac)return;try{s.ac=new(window.AudioContext||window.webkitAudioContext)();s.sn={s:makeOsc(880,0.15),w:makeOsc(440,0.12),u:makeOsc(660,0.13)};}catch(e){}}
function makeOsc(f,d){return function(){if(!s.ac||s.ac.state==="suspended")return;var o=s.ac.createOscillator();var g=s.ac.createGain();o.connect(g);g.connect(s.ac.destination);o.frequency.value=f;o.type="sine";g.gain.value=0.5;g.gain.exponentialRampToValueAtTime(0.01,s.ac.currentTime+d);o.start();o.stop(s.ac.currentTime+d);};}
function speak(n){if(!s.ss||s.sm!=="voice")return;var u=new SpeechSynthesisUtterance(n.toString());u.rate=Math.min(2.5,Math.max(0.8,0.8+s.bpm/100));u.pitch=1.5;s.ss.speak(u);}
function setMode(mode){s.sm=mode;s.cb=0;document.querySelectorAll(".mode-btn").forEach(function(e){e.classList.toggle("active",e.dataset.mode===mode);});updateBeats();if(s.r){stop();start();}save();}
function setTS(sig){var a=sig.split("/");s.bc=parseInt(a[0]);s.bu=parseInt(a[1]);s.cb=0;document.querySelectorAll(".time-btn").forEach(function(e){e.classList.toggle("active",e.dataset.sig===sig);});updateBeats();save();}
function updateBeats(){var c=document.getElementById("beats-container");c.innerHTML="";for(var i=0;i<s.bc;i++){var e=document.createElement("div");var cls="beat";if(s.sm==="traditional"&&i===0)cls+=" strong";else cls+=" "+s.sm;e.className=cls;e.textContent=i+1;e.dataset.beat=i;c.appendChild(e);}}
function playBeat(b){if(s.sm==="traditional"){b===0?s.sn.s():s.sn.w();}else if(s.sm==="uniform"){s.sn.u();}else if(s.sm==="voice"){speak(b+1);}}
function start(){if(s.r)return;initAudio();if(s.ac&&s.ac.state==="suspended")s.ac.resume();s.r=true;var btn=document.getElementById("play-btn");btn.innerHTML="⏸";btn.classList.add("running");s.iId=setInterval(tick,60000/s.bpm);setTimeout(tick,50);}
function stop(){if(!s.r)return;s.r=false;clearInterval(s.iId);var btn=document.getElementById("play-btn");btn.innerHTML="▶";btn.classList.remove("running");document.querySelectorAll(".beat").forEach(function(e){e.classList.remove("pop");});}
function tick(){document.querySelectorAll(".beat").forEach(function(e){e.classList.remove("pop");});var el=document.querySelector("[data-beat='"+s.cb+"']");if(el)el.classList.add("pop");playBeat(s.cb);s.cb=(s.cb+1)%s.bc;}
updateBeats();
</script>
</body>
</html>
